<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Your Show</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: white; }
    .btn-primary { background: white; border: 2px solid #ff4d2e; color: #ff4d2e; font-weight: 600; padding: 10px 24px; border-radius: 12px; transition: all 0.2s; cursor: pointer; }
    .btn-primary:hover { background: #ff4d2e; color: white; }
    .btn-secondary { background: #ff4d2e; color: white; font-weight: 600; padding: 10px 24px; border-radius: 12px; transition: all 0.2s; cursor: pointer; }
    .btn-secondary:hover { background: #e63e1f; }
    .btn-outline { border: 2px solid #ff4d2e; color: #ff4d2e; font-weight: 600; padding: 10px 24px; border-radius: 12px; transition: all 0.2s; background: white; cursor: pointer; }
    .btn-outline:hover { background: #ff4d2e; color: white; }
    .card { background: white; border: 1px solid #e5e7eb; border-radius: 16px; overflow: hidden; transition: box-shadow 0.3s; }
    .card:hover { box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
    .input-field { width: 100%; padding: 12px 16px; border: 1px solid #e5e7eb; border-radius: 12px; outline: none; transition: all 0.2s; }
    .input-field:focus { border-color: #ff4d2e; box-shadow: 0 0 0 2px rgba(255,77,46,0.1); }
    .seat { width: 36px; height: 36px; border-radius: 8px 8px 0 0; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; }
    .seat-normal { background: #f3f4f6; border: 1px solid #e5e7eb; }
    .seat-premium { background: #fed7aa; border: 1px solid #fdba74; }
    .seat-recliner { background: #fecaca; border: 1px solid #fca5a5; }
    .seat-selected { background: #ff4d2e; color: white; transform: scale(1.05); border: none; }
    .seat-booked { background: #9ca3af; cursor: not-allowed; opacity: 0.5; }
    .seat-hold { background: #fbbf24; cursor: not-allowed; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
